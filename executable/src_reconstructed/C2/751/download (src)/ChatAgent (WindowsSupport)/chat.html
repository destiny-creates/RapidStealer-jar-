<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Support Chat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: #fff;
      overflow: hidden;
    }

    /* Title bar */
    #titlebar {
      -webkit-app-region: drag;
      background: #111;
      border-bottom: 1px solid #1f1f1f;
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #titlebar .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #titlebar .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e63946;
      box-shadow: 0 0 8px #e63946;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #titlebar .title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
    }

    #titlebar .subtitle {
      font-size: 10px;
      color: #555;
      letter-spacing: 0.05em;
      margin-top: 1px;
    }

    #titlebar .close-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: 1px solid #222;
      color: #555;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    #titlebar .close-btn:hover {
      background: #e63946;
      border-color: #e63946;
      color: #fff;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: #222 transparent;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }

    /* Date divider */
    .divider {
      text-align: center;
      font-size: 10px;
      color: #333;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 4px 0;
    }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble-wrap.from-admin { align-items: flex-start; }
    .bubble-wrap.from-me    { align-items: flex-end; }

    .sender-label {
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .from-admin .sender-label { color: #e63946; }
    .from-me    .sender-label { color: #555; }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.55;
      word-break: break-word;
      position: relative;
    }

    .from-admin .bubble {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 2px 12px 12px 12px;
      color: #e8e8e8;
    }

    .from-me .bubble {
      background: #e63946;
      border: 1px solid #c1121f;
      border-radius: 12px 2px 12px 12px;
      color: #fff;
    }

    .bubble .time {
      font-size: 10px;
      margin-top: 5px;
      opacity: 0.45;
      text-align: right;
    }

    /* Input area */
    #input-area {
      padding: 12px 16px;
      background: #111;
      border-top: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: #161616;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }

    #msg-input::placeholder { color: #3a3a3a; }

    #msg-input:focus { border-color: #e63946; }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: none;
      background: #e63946;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    #send-btn:hover  { background: #c1121f; }
    #send-btn:active { transform: scale(0.93); }

    /* Empty state */
    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #2a2a2a;
      pointer-events: none;
    }

    #empty .icon { font-size: 32px; }
    #empty .text { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
  </style>
</head>
<body>

  <div id="titlebar">
    <div class="brand">
      <div class="dot"></div>
      <div>
        <div class="title">Support</div>
        <div class="subtitle">Live Chat</div>
      </div>
    </div>
    <button class="close-btn" id="close-btn">✕</button>
  </div>

  <div id="messages">
    <div id="empty">
      <div class="icon">💬</div>
      <div class="text">Waiting for messages...</div>
    </div>
  </div>

  <div id="input-area">
    <input id="msg-input" type="text" placeholder="Type a message..." autocomplete="off" spellcheck="false" />
    <button id="send-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('msg-input');
    const emptyEl    = document.getElementById('empty');
    let messageCount = 0;

    function fmt(ts) {
      return new Date(ts || Date.now()).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function addBubble(text, side, ts) {
      if (messageCount === 0) emptyEl.remove();
      messageCount++;

      const wrap = document.createElement('div');
      wrap.className = `bubble-wrap from-${side}`;

      const label = document.createElement('div');
      label.className = 'sender-label';
      label.textContent = side === 'admin' ? 'Support' : 'You';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = `${text}<div class="time">${fmt(ts)}</div>`;

      wrap.appendChild(label);
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    window.agent.onMessage((msg) => addBubble(msg.text, 'admin', msg.ts));

    function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      window.agent.sendMessage(text);
      addBubble(text, 'me', Date.now());
      inputEl.value = '';
    }

    document.getElementById('send-btn').onclick = send;
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
    document.getElementById('close-btn').onclick = () => window.agent.closeWindow();
  </script>
</body>
</html>
